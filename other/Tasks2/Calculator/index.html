<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>Calculator</title>
    <link rel="stylesheet" href="/styling.css">
  </head>
  <body>
    <div id="calc-grid-container">
      <textarea id="calc-screen">0</textarea><!--0</div>-->
      
      <div class="wide-button" id="ac-button">AC</div>
      <div class="wide-button" id="del-button">DEL</div>
      <div class="number-key">7</div>
      <div class="number-key">8</div>
      <div class="number-key">9</div>
      <div class="operator">/</div>
      
      <div class="number-key">4</div>
      <div class="number-key">5</div>
      <div class="number-key">6</div>
      <div class="operator">x</div>
      
      <div class="number-key">1</div>
      <div class="number-key">2</div>
      <div class="number-key">3</div>
      <div class="operator">-</div>
      
      <div class="number-key">0</div>
      <div id="point" class="number-key">.</div>
      <div id="equals-button">=</div>
      <div class="operator">+</div>
      
    </div>
  </body>

  <!-- <script src="/sound-script.js"></script> -->
  <script src="/script.js"></script>

</html>
